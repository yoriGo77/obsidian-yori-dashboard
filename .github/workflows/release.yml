name: Release Yori Dashboard

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify manifest version matches tag
        run: |
          set -e
          TAG_VERSION="${GITHUB_REF_NAME}"
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          echo "tag=$TAG_VERSION manifest=$MANIFEST_VERSION"
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match manifest.json version $MANIFEST_VERSION"
            exit 1
          fi

      - name: Run unit tests
        run: npm test

      - name: Rebuild bundle (sanity check)
        run: npm run build

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "Yori Dashboard ${GITHUB_REF_NAME}. See CHANGELOG / commit history for details." \
            main.js manifest.json styles.css
